<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
        margin: 0;
      }

      #calculator {
        background-color: #222;
        border-radius: 16px;
        padding: 20px;
        width: 280px;
      }

      #display {
        background-color: #333;
        color: white;
        font-size: 36px;
        text-align: right;
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 16px;
      }

      #buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        background-color: #555;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 20px;
        padding: 18px;
        cursor: pointer;
      }

      button:hover {
        background-color: #777;
      }
    </style>
  </head>
  <body>

    <div id="calculator">
      <div id="display">0</div>
      <div id="buttons">

        <!-- Row 1 -->
        <button onclick="clearAll()">AC</button>
        <button onclick="percent()">%</button>
        <button onclick="inputOp('/')">÷</button>
        <button onclick="backspace()">⌫</button>

        <!-- Row 2 -->
        <button onclick="inputNum('7')">7</button>
        <button onclick="inputNum('8')">8</button>
        <button onclick="inputNum('9')">9</button>
        <button onclick="inputOp('*')">×</button>

        <!-- Row 3 -->
        <button onclick="inputNum('4')">4</button>
        <button onclick="inputNum('5')">5</button>
        <button onclick="inputNum('6')">6</button>
        <button onclick="inputOp('-')">−</button>

        <!-- Row 4 -->
        <button onclick="inputNum('1')">1</button>
        <button onclick="inputNum('2')">2</button>
        <button onclick="inputNum('3')">3</button>
        <button onclick="inputOp('+')">+</button>

        <!-- Row 5 -->
        <button onclick="inputNum('0')">0</button>
        <button onclick="inputDot()">.</button>
        <button onclick="calculate()">=</button>

      </div>
    </div>

    <script>
      let current = '0';
      let prev = '';
      let operator = '';
      let shouldReset = false;

      function updateDisplay() {
        document.getElementById('display').textContent = current;
      }

      function inputNum(n) {
        if (shouldReset) {
          current = n;
          shouldReset = false;
        } else {
          current = current === '0' ? n : current + n;
        }
        updateDisplay();
      }

      function inputDot() {
        if (!current.includes('.')) current += '.';
        updateDisplay();
      }
      function backspace() {
  if (current.length > 1) {
    current = current.slice(0, -1);
  } else {
    current = '0';
  }
  updateDisplay();
}

function inputOp(op) {
  if (current === '0' && prev === '') return; // do nothing if no number pressed yet
  prev = current;
  operator = op;
  current = current + ' ' + op + ' '; // show on display
  shouldReset = true;
  updateDisplay();
}
      function calculate() {
        let a = parseFloat(prev);
        let b = parseFloat(current);
        let result;

        if (operator === '+') result = a + b;
        else if (operator === '-') result = a - b;
        else if (operator === '*') result = a * b;
        else if (operator === '/') result = a / b;

        current = String(parseFloat(result.toFixed(10)));
        prev = '';
        operator = '';
        shouldReset = true;
        updateDisplay();
      }

      function clearAll() {
        current = '0';
        prev = '';
        operator = '';
        shouldReset = false;
        updateDisplay();
      }

      function percent() {
        current = String(parseFloat(current) / 100);
        updateDisplay();
      }
    </script>

  </body>
</html>
